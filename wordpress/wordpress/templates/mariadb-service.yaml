apiVersion: v1
kind: Service
metadata:
  name: {{ include "wordpress.fullname" . }}-mariadb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    component: mariadb
spec:
  selector:
    {{- include "wordpress.selectorLabels" . | nindent 4 }}
    component: mariadb
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
